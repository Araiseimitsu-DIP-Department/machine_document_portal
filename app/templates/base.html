<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e88e5">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', path='/images/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
  <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
</head>
<body data-auto-refresh-seconds="{{ auto_refresh_seconds }}">
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" aria-label="メインナビゲーション">
      <div class="sidebar-header">
        <img class="brand-logo" src="/design-assets/arai_logo.png" alt="新井精密">
        <span class="brand-mark" aria-hidden="true">A</span>
        <button class="icon-button sidebar-toggle" type="button" aria-label="サイドバーを折りたたむ" title="サイドバーを折りたたむ" data-sidebar-toggle>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" href="/" aria-current="page" title="号機一覧">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/></svg>
          <span class="nav-label">号機一覧</span>
        </a>
      </nav>
      <div class="sidebar-meta">
        <span class="nav-label">{{ dashboard.source_label }}</span>
        <span class="status-dot {% if dashboard.degraded %}danger{% else %}success{% endif %}" aria-hidden="true"></span>
      </div>
    </aside>

    <div class="app-content">
      <main class="main-content" id="main-content">
        {% block content %}{% endblock %}
      </main>
      <footer class="app-footer">© ARAISEIMITSU {{ current_year }} - Created By DIP Department</footer>
    </div>
  </div>
  <div class="toast" role="status" aria-live="polite" aria-atomic="true" data-toast hidden></div>
  <dialog class="drawing-preview-dialog" aria-label="加工図プレビュー" data-drawing-preview-dialog>
    <div class="drawing-preview-header">
      <strong data-drawing-preview-title>加工図</strong>
      <div class="drawing-preview-actions">
        <button class="icon-button" type="button" aria-label="画像を縮小" title="縮小" data-drawing-preview-zoom-out>−</button>
        <button class="icon-button" type="button" aria-label="画像を等倍に戻す" title="等倍に戻す" data-drawing-preview-zoom-reset>100%</button>
        <button class="icon-button" type="button" aria-label="画像を拡大" title="拡大" data-drawing-preview-zoom-in>＋</button>
        <button class="icon-button" type="button" aria-label="加工図プレビューを閉じる" title="閉じる" data-drawing-preview-close>×</button>
      </div>
    </div>
    <div class="drawing-preview-body">
      <img alt="加工図プレビュー" data-drawing-preview-image>
    </div>
  </dialog>
</body>
</html>
